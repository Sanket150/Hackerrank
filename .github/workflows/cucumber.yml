name: Hackerrank Tests

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Enter Cucumber tag to run (e.g., @TC_1)"
        required: true
        default: "@TC_1"

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
